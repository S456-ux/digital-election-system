<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }
        table {
            margin: auto;
            border-collapse: collapse;
        }
        td, th {
            border: 1px solid white;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>Election Results</h2>

    <table>
        <tr>
            <th>Candidate</th>
            <th>Votes</th>
        </tr>
        {% for row in data %}
        <tr>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/vote">Back</a>
</body>
</html>
