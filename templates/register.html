<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #11998e, #38ef7d);
            text-align: center;
        }
        .box {
            background: white;
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Register</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username"><br>
            <input type="password" name="password" placeholder="Password"><br>
            <button type="submit">Register</button>
        </form>
        <br>
        <a href="/">Back to Login</a>
    </div>
</body>
</html>
